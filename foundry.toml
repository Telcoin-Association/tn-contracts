[profile.default]
auto_detect_solc = false
bytecode_hash = "none"
evm_version = "prague"
fuzz = { runs = 250 } # default
gas_reports = ["*"]
optimizer = true
optimizer_runs = 200
out = "out"
script = "script"
solc = "0.8.35"
src = "src"
test = "test"
libs = ["lib"]
fs_permissions = [
    { access = "read-write", path = "./deployments/genesis/consensus-registry-config.yaml" },
    { access = "read-write", path = "./deployments/genesis/precompile-config.yaml" },
    { access = "read-write", path = "./deployments/deployments-testnet.json" },
    { access = "read-write", path = "./deployments/deployments-devnet.json" },
    { access = "read", path = "./deployments/deployments-mainnet.json" },
    { access = "read", path = "./external/uniswap/precompiles" },
    { access = "read", path = "./cache/seed-testnet-lps-fx.json" },
]

[profile.ci]
# Quick PR feedback - runs on every PR push via .github/workflows/test.yml.
# Catches obvious fuzz bugs without blocking merges for hours. For deep fuzzing
# before a release / for attestations, run `FOUNDRY_PROFILE=attestation forge test`
# locally - that profile is intentionally not wired into any GitHub workflow
# because 10k runs blows past Actions' 6h job timeout.
fuzz = { runs = 64 }
verbosity = 2

[profile.attestation]
# LOCAL ONLY. Heavy fuzz pass for release attestations and paranoid local checks.
# Run with `FOUNDRY_PROFILE=attestation forge test`. Not wired into PR CI because
# at this run count the suite exceeds GitHub Actions' 6h job timeout.
fuzz = { runs = 10_000 }
verbosity = 4

[profile.fast]
fuzz = { runs = 1 }
verbosity = 2

# Network shorthands for `--rpc-url <name>`. Scripts resolve the matching
# deployments json by chain id (see deployments/DeploymentsResolver.sol):
# testnet (0x7e1) uses deployments-testnet.json, devnet (0x7e1d) uses
# deployments-devnet.json. deployments-mainnet.json holds only genesis-assigned
# addresses and is consumed by GenerateGenesisPrecompileConfig; its chain id
# mapping is added once mainnet's chain id is finalized.
[rpc_endpoints]
testnet = "https://node1.telcoin.network"
devnet = "https://node1.devnet.telcoin.network"
devnet2 = "https://node2.devnet.telcoin.network"
devnet3 = "https://node3.devnet.telcoin.network"
devnet4 = "https://node4.devnet.telcoin.network"

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
